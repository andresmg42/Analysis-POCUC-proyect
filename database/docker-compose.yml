version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pocucdb
      MYSQL_USER: andresuv
      MYSQL_PASSWORD: pocucdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup_prepiloto.sql:/docker-entrypoint-initdb.d/backup.sql
    networks:
      - db_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: andresuv
      PMA_PASSWORD: pocucdb
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - db_network

volumes:
  mysql_data:

networks:
  db_network:
    driver: bridge